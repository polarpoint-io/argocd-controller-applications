chart:
  name: crossplane
  url: https://charts.crossplane.io/stable
  targetRevision: 2.3.2
  namespace: iac

labels:
  service: controller
  app: crossplane

syncPolicy:
  prune: false
  selfHeal: false

values: |
  replicas: 1

  provider:
    packages: []

  configuration:
    packages: []

  metrics:
    enabled: false

  resourcesCrossplane:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
