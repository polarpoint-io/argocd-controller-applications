chart:
  name: backstage
  url: https://backstage.github.io/charts
  targetRevision: 2.8.1
  namespace: platform

labels:
  service: platform
  app: backstage

syncPolicy:
  prune: false
  selfHeal: false

values: |
  fullnameOverride: backstage

  global:
    security:
      allowInsecureImages: true

  backstage:
    image:
      registry: ghcr.io
      repository: polarpoint-io/backstage
      tag: "latest"
      pullPolicy: Always
    containerPorts:
      backend: 7007
    command: ["node", "packages/backend"]
    args: ["--config", "app-config.yaml", "--config", "app-config.production.yaml"]
    extraEnvVars:
      - name: POSTGRES_HOST
        value: backstage-postgresql
    extraEnvVarsSecrets:
      - backstage-database-authentication
      - backstage-kubernetes-authentication
      - backstage-github-authentication
    extraVolumes:
      - name: app-config
        configMap:
          name: backstage-app-config
    extraVolumeMounts:
      - name: app-config
        mountPath: /app/app-config.yaml
        subPath: app-config.yaml
      - name: app-config
        mountPath: /app/app-config.production.yaml
        subPath: app-config.production.yaml

  postgresql:
    enabled: true
    fullnameOverride: backstage-postgresql
    image:
      repository: bitnamilegacy/postgresql
    auth:
      username: backstage
      database: backstage
      existingSecret: backstage-db
    primary:
      persistence:
        size: 8Gi
