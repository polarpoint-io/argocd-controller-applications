# Carried over from the previous running backstage (RKE1 era) -
# production app-config, plus the catalog + kubernetes sections.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: platform
data:
  app-config.production.yaml: |
    app:
      title: polarpoint
      baseUrl: https://{{ .Values.host }}
      support:
        url: https://github.com/polarpoint-io/backstage/issues
        items:
          - title: Issues
            icon: github
            links:
              - url: https://github.com/backstage/backstage/issues
                title: GitHub Issues
          - title: Slack Chatroom
            icon: chat
            links:
              - url: https://polarpoint.slack.com/archives/C03T35W09HC
                title: '#backstage'

    organization:
      name: Polarpoint

    backend:
      baseUrl: https://{{ .Values.host }}
      listen:
        port: 7007
        host: 0.0.0.0
      csp:
        connect-src: ["'self'", 'http:', 'https:']
        img-src: ["'self'", 'data:', 'https://avatars.githubusercontent.com']
      cors:
        origin: https://{{ .Values.host }}
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
      cache:
        store: memory

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - url: ${K8S_URL}
              name: tooling
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: true
              serviceAccountToken: ${K8S_TOKEN}

    techdocs:
      builder: 'local'
      generator:
        runIn: 'local'
      publisher:
        type: 'local'

    auth:
      environment: production
      providers:
        github:
          production:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}

    scaffolder:
      defaultAuthor:
        name: ':robot: [backstage-bot]'
        email: mail@polarpoint.io

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow:
            - API
            - Component
            - Domain
            - Group
            - System
            - User
            - Template
            - Resource
            - Location
      locations:
        - type: url
          target: https://github.com/polarpoint-io/backstage-catalog/blob/main/all.yaml
